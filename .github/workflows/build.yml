name: Build & Release ORION

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build
        env:
          RUSTFLAGS: -A dead_code

      - name: Get version from tauri.conf.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}-b${{ github.run_number }}"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ORION ${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            Auto-built from commit ${{ github.sha }}

            ## Changes
            ${{ github.event.head_commit.message }}

            ## What's included
            - ORION Tauri desktop app
            - Full Rust backend with all CORE modules
            - Vercel-style UI
            - Multi-brain AI routing (Groq, OpenRouter, Gemini, Ollama)
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
